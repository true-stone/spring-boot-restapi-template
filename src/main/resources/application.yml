server:
  port: 8080

spring:
  profiles:
    default: local
  application:
    name: spring-boot-api-template

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        auto_quote_keyword: true

  web:
    resources:
      add-mappings: false # 정적 리소스 매핑을 비활성화 (404 No Found 핸들링)

logging:
  file:
    path: ./logs