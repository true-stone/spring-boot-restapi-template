server:
  port: 8080

spring:
  profiles:
    default: local
  application:
    name: spring-boot-api-template

  jpa:
    open-in-view: false
    properties:
      hibernate:
        auto_quote_keyword: true
        default_batch_fetch_size: 100
        use_sql_comments: true

  sql:
    init:
      mode: embedded

  web:
    resources:
      add-mappings: false # 정적 리소스 매핑을 비활성화 (404 No Found 핸들링)